<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>知识库 · 周云飞</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script>
    // 备用：若 CDN 加载失败则从 unpkg 加载
    window.addEventListener('load', function() {
      if (typeof marked === 'undefined') {
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/marked@9.1.6/marked.min.js';
        document.head.appendChild(s);
      }
    });
  </script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:         #ffffff;
      --surface:    #ffffff;
      --surface2:   #f5f6f7;          /* 侧边栏底色，飞书风格浅灰 */
      --surface3:   #f0f1f2;          /* 搜索区底色 */
      --surface4:   #f7f8fa;          /* 卡片背景 */
      --border:     #e8eaed;
      --border2:    #d9dde4;
      --text:       #1f2329;          /* 飞书主色文本 */
      --text2:      #646a73;
      --text3:      #b2b8c1;
      --accent:     #e8632a;
      --accent-sub: #f0954e;
      --accent-bg:  rgba(232,99,42,.08);
      --accent-bg2: rgba(232,99,42,.05);
      --accent-pill:rgba(232,99,42,.09);
      --link:       #2c6bed;          /* 飞书蓝链接 */
      --r:          6px;
      --r2:         8px;
      --t:          0.15s ease;
      --nav-h:      48px;
      --sidebar-w:  228px;
      --toc-w:      200px;            /* 右侧大纲栏宽度 */
    }
    html { scroll-behavior:smooth; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--text); background:var(--bg);
      font-size:15px; line-height:1.75; overflow-x:hidden;
    }
    a { text-decoration:none; color:inherit; }

    /* ───────── TOP NAV ───────── */
    .top-nav {
      position:fixed; top:0; left:0; right:0; z-index:400;
      height:var(--nav-h);
      background:rgba(255,255,255,.97);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center;
      padding:0 1rem 0 0;
      gap:.4rem;
    }
    .nav-brand {
      display:flex; align-items:center; gap:.55rem;
      padding:0 1rem 0 1.2rem;
      height:100%;
      border-right:1px solid var(--border);
      flex-shrink:0;
      min-width:var(--sidebar-w);
      text-decoration:none;
    }
    .nav-brand img { height:24px; width:auto; }
    .nav-brand-title {
      font-size:.88rem; font-weight:600; color:var(--text);
      white-space:nowrap; letter-spacing:-.01em;
    }
    /* 面包屑（顶部中间） */
    .nav-breadcrumb {
      display:flex; align-items:center; gap:.25rem;
      font-size:.8rem; color:var(--text3);
      overflow:hidden; white-space:nowrap; flex:1;
    }
    .nav-breadcrumb .nbc-sep { color:var(--border2); margin:0 .05rem; }
    .nav-breadcrumb .nbc-item { color:var(--text2); }
    .nav-breadcrumb .nbc-item.current { color:var(--text); font-weight:500; }

    .nav-right { display:flex; align-items:center; gap:.3rem; margin-left:auto; flex-shrink:0; }
    .nav-icon-btn {
      height:30px; padding:0 .65rem;
      border-radius:var(--r);
      border:none; background:transparent; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:.8rem; color:var(--text2);
      white-space:nowrap;
      transition:background var(--t), color var(--t);
    }
    .nav-icon-btn:hover { background:var(--surface4); color:var(--text); }

    /* ───────── LAYOUT ───────── */
    .layout {
      display:flex;
      padding-top:var(--nav-h);
      min-height:100vh;
    }

    /* ───────── SIDEBAR ───────── */
    .sidebar {
      width:var(--sidebar-w);
      background:var(--surface2);
      border-right:1px solid var(--border);
      position:fixed;
      top:var(--nav-h); bottom:0; left:0;
      display:flex; flex-direction:column;
      overflow:hidden;
      z-index:200;
    }

    /* 搜索 */
    .sb-search {
      padding:.6rem .75rem;
      flex-shrink:0;
    }
    .sb-search-inner {
      display:flex; align-items:center; gap:.35rem;
      background:rgba(255,255,255,.9);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:.3rem .65rem;
      transition:border-color var(--t), box-shadow var(--t);
    }
    .sb-search-inner:focus-within {
      border-color:var(--accent);
      box-shadow:0 0 0 2px var(--accent-bg);
    }
    .sb-search-inner .icon { font-size:.75rem; color:var(--text3); flex-shrink:0; }
    .sb-search-inner input {
      flex:1; border:none; background:transparent; outline:none;
      font-size:.8rem; color:var(--text);
    }
    .sb-search-inner input::placeholder { color:var(--text3); }

    /* 树滚动区 */
    .sb-tree {
      flex:1; overflow-y:auto;
      padding:.4rem 0 2rem;
    }
    .sb-tree::-webkit-scrollbar { width:3px; }
    .sb-tree::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

    /* 分类标题 */
    .sb-cat { margin-bottom:.1rem; }
    .sb-cat + .sb-cat { margin-top:.6rem; }
    .sb-cat-header {
      display:flex; align-items:center; gap:.35rem;
      padding:.55rem .75rem .55rem .4rem;
      font-size:.9rem; font-weight:800; color:var(--text);
      cursor:pointer; user-select:none;
      border-radius:var(--r);
      margin:.15rem .4rem;
      transition:background var(--t), color var(--t);
      letter-spacing:.03em;
    }
    .sb-cat-header:hover { background:rgba(0,0,0,.04); }
    .sb-cat-header .arrow {
      font-size:.48rem; transition:transform .18s, opacity .15s;
      flex-shrink:0; color:var(--text3);
      opacity:0;
    }
    .sb-cat-header:hover .arrow { opacity:1; }
    .sb-cat-header.open .arrow { transform:rotate(90deg); }
    .sb-cat-header .cat-icon { display:none; }
    .sb-cat-header .cat-name { flex:1; }

    /* 文章列表 */
    .sb-doc-list { display:none; }
    .sb-doc-list.open { display:block; }

    .sb-doc-item {
      display:flex; align-items:center;
      padding:.3rem .6rem .3rem 1.5rem;
      margin:0 .4rem .03rem;
      font-size:.75rem; font-weight:400; color:var(--text3);
      cursor:pointer;
      border-radius:var(--r);
      position:relative;
      transition:background var(--t), color var(--t);
    }
    .sb-doc-item:hover {
      background:rgba(0,0,0,.03);
      color:var(--text2);
    }
    .sb-doc-item.active {
      color:var(--accent);
      font-weight:600;
      background:var(--accent-pill);
    }
    /* 激活态左边框 */
    .sb-doc-item.active::before {
      content:'';
      position:absolute; left:0; top:20%; bottom:20%;
      width:2.5px; border-radius:2px;
      background:var(--accent);
    }
    .sb-doc-item.hidden { display:none; }

    .sb-doc-item { gap:0; }
    .sb-doc-arrow {
      flex-shrink:0;
      width:1rem; height:1rem;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:.44rem; color:transparent;
      border-radius:3px;
      transition:color var(--t), background var(--t), transform .15s;
      cursor:default;
      margin-left:-.8rem; margin-right:.25rem;
      pointer-events:none;
    }
    .sb-doc-item:hover .sb-doc-arrow.has-outline {
      color:var(--text3);
      cursor:pointer; pointer-events:auto;
    }
    .sb-doc-item:hover .sb-doc-arrow.has-outline:hover { background:rgba(0,0,0,.06); color:var(--text2); }
    .sb-doc-item:hover .sb-doc-arrow.has-outline.open { color:var(--accent); }
    .sb-doc-arrow.open { transform:rotate(90deg); }
    .sb-doc-label { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* 文档内大纲（侧边栏里的折叠大纲） */
    .sb-outline { display:none; }
    .sb-outline.open { display:block; margin:.05rem 0 .3rem; }
    .sb-outline-h2 {
      display:flex; align-items:center; gap:.2rem;
      padding:.2rem .6rem .2rem 2.6rem;
      font-size:.78rem; color:var(--text3);
      cursor:pointer; white-space:nowrap; overflow:hidden;
      transition:color var(--t), background var(--t);
      user-select:none; margin:0 .4rem;
      border-radius:4px;
    }
    .sb-outline-h2:hover { color:var(--text2); background:rgba(0,0,0,.03); }
    .sb-outline-h2 .h2-arrow {
      flex-shrink:0; width:.8rem; height:.8rem;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:.44rem; color:transparent;
      transition:transform .15s, color var(--t);
    }
    .sb-outline-h2:hover .h2-arrow { color:var(--text3); }
    .sb-outline-h2.open .h2-arrow { transform:rotate(90deg); }
    .sb-outline-h2.open:hover .h2-arrow { color:var(--accent); }
    .sb-outline-h2 .h2-label { flex:1; overflow:hidden; text-overflow:ellipsis; }
    .sb-outline-h2.active-heading { color:var(--accent); }
    .sb-outline-h2.no-children .h2-arrow { visibility:hidden; }
    .sb-outline-h3 {
      display:none;
      padding:.17rem .6rem .17rem 3.6rem;
      font-size:.76rem; color:var(--text3);
      cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      transition:color var(--t), background var(--t);
      margin:0 .4rem; border-radius:4px;
    }
    .sb-outline-h3.visible { display:block; }
    .sb-outline-h3:hover { color:var(--text2); background:rgba(0,0,0,.03); }
    .sb-outline-h3.active-heading { color:var(--accent); }
    .sb-outline-h3.top-level { display:block; padding-left:2.6rem; }

    /* 拖拽样式 */
    .sb-cat[draggable] { cursor:grab; }
    .sb-cat[draggable]:active { cursor:grabbing; }
    .sb-doc-item[draggable] { cursor:grab; }
    .sb-doc-item[draggable]:active { cursor:grabbing; }
    .drag-over-cat { background:var(--accent-bg); border-radius:var(--r); }
    .drag-over-doc { background:var(--accent-bg2); border-radius:var(--r); }
    .drag-handle {
      display:inline-flex; align-items:center;
      margin-right:.25rem; color:var(--text3);
      font-size:.65rem; opacity:0;
      transition:opacity var(--t);
      cursor:grab; user-select:none; flex-shrink:0;
    }
    .sb-cat-header:hover .drag-handle,
    .sb-doc-item:hover .drag-handle { opacity:1; }
    .drag-placeholder {
      height:2px; background:var(--accent);
      border-radius:1px; margin:2px 0;
      pointer-events:none;
    }

    /* 无结果 */
    .sb-no-result {
      padding:.8rem 1rem;
      font-size:.78rem; color:var(--text3);
      text-align:center; display:none;
    }

    /* ───────── MAIN ───────── */
    .main {
      flex:1;
      margin-left:var(--sidebar-w);
      min-width:0;
      background:var(--bg);
      /* 为右侧大纲腾出空间（大屏才有）*/
    }
    .doc-wrap {
      max-width:760px;
      margin:0 auto;
      padding:2.6rem 2.5rem 7rem;
      /* 当大纲栏显示时，内容向左偏移，由 JS 动态控制或用 padding */
    }

    /* ───────── 右侧大纲栏 (TOC) ───────── */
    .toc-aside {
      width:var(--toc-w);
      position:fixed;
      top:calc(var(--nav-h) + 2rem);
      right:1.5rem;
      max-height:calc(100vh - var(--nav-h) - 4rem);
      overflow-y:auto;
      display:none; /* 默认隐藏，JS 控制显示 */
      flex-direction:column;
      z-index:100;
    }
    .toc-aside.visible { display:flex; }
    .toc-aside::-webkit-scrollbar { width:3px; }
    .toc-aside::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
    .toc-title {
      font-size:.72rem; font-weight:600; color:var(--text3);
      letter-spacing:.08em; text-transform:uppercase;
      margin-bottom:.7rem; padding:0 .3rem;
    }
    .toc-item {
      display:block;
      padding:.25rem .5rem;
      font-size:.78rem; color:var(--text3);
      line-height:1.45;
      border-left:2px solid transparent;
      cursor:pointer;
      transition:color var(--t), border-color var(--t), background var(--t);
      border-radius:0 var(--r) var(--r) 0;
    }
    .toc-item:hover { color:var(--text2); background:rgba(0,0,0,.03); }
    .toc-item.toc-h2 { font-weight:500; color:var(--text2); }
    .toc-item.toc-h3 { padding-left:1.1rem; font-size:.76rem; }
    .toc-item.toc-active {
      color:var(--accent);
      border-left-color:var(--accent);
      background:var(--accent-bg);
      font-weight:500;
    }

    /* 面包屑（文档区） */
    .breadcrumb {
      display:flex; align-items:center; gap:.35rem;
      font-size:.75rem; color:var(--text3);
      margin-bottom:1.6rem;
    }
    .breadcrumb .bc-sep { color:var(--border2); }
    .breadcrumb .bc-cat {
      color:var(--text2);
      display:flex; align-items:center; gap:.25rem;
    }
    .breadcrumb .bc-doc { color:var(--text2); font-weight:500; }

    /* 文章 meta */
    .doc-meta {
      display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
      font-size:.8rem; color:var(--text3);
      margin-bottom:2rem;
      padding-bottom:1rem;
      border-bottom:1px solid var(--border);
    }
    .doc-meta span { display:flex; align-items:center; gap:.2rem; }

    /* ───────── MARKDOWN ───────── */
    .md { font-size:15px; line-height:1.9; }

    /* h1 */
    .md h1 {
      font-size:1.85rem; font-weight:700; letter-spacing:-.02em;
      margin:0 0 1.4rem; line-height:1.3; color:var(--text);
    }
    /* h2：飞书风格，简洁，无背景色块 */
    .md h2 {
      font-size:1.18rem; font-weight:600; color:var(--text);
      margin:2.4rem 0 .8rem;
      padding:.25rem 0 .75rem;
      border-bottom:1px solid var(--border);
    }
    /* h3：稍小，中等粗，左侧短竖线 */
    .md h3 {
      font-size:1.02rem; font-weight:600;
      margin:1.6rem 0 .55rem;
      color:var(--text);
      padding-left:.85rem;
      position:relative;
    }
    .md h3::before {
      content:'';
      position:absolute; left:0; top:.15em; bottom:.15em;
      width:3px; border-radius:2px;
      background:var(--accent-sub);
    }
    .md h4 { font-size:.95rem; font-weight:600; margin:1.4rem 0 .45rem; color:var(--text2); }
    .md p  { margin-bottom:1rem; }
    .md ul, .md ol { margin:.8rem 0 .8rem 1.5rem; }
    .md li { margin-bottom:.35rem; line-height:1.8; }
    .md li > ul, .md li > ol { margin:.25rem 0 .25rem 1.2rem; }

    /* 行内代码 */
    .md code {
      background:#f3f4f6;
      color:#c0471a;
      padding:.1rem .36rem; border-radius:4px;
      font-family:"SF Mono","Cascadia Code","Consolas",Monaco,monospace;
      font-size:.875em;
    }

    /* 代码块：深色主题 */
    .md pre {
      background:#1e1e2e;
      border:none;
      border-radius:var(--r2);
      overflow:hidden;
      margin:1.3rem 0;
      font-size:.875rem;
      line-height:1.7;
      box-shadow:0 2px 12px rgba(0,0,0,.1);
    }
    .md pre.has-lang-label::before {
      display:block;
      padding:.25rem .9rem;
      background:rgba(255,255,255,.05);
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:.7rem; color:rgba(255,255,255,.4);
      letter-spacing:.06em; font-weight:600;
    }
    .md pre code {
      display:block;
      background:transparent; color:#cdd6f4; padding:.9rem 1.2rem;
      font-size:inherit; overflow-x:auto;
    }
    .md pre code[class*="language-"]::before { display:none; }

    .md blockquote {
      border-left:3px solid var(--border2);
      background:var(--surface4);
      padding:.7rem 1rem;
      margin:1.2rem 0;
      border-radius:0 var(--r) var(--r) 0;
      color:var(--text2);
      font-size:.94em;
    }
    .md blockquote p { margin:0; }
    .md table { width:100%; border-collapse:collapse; margin:1.2rem 0; font-size:.9rem; }
    .md th, .md td { padding:.55rem .85rem; border:1px solid var(--border); text-align:left; }
    .md th { background:var(--surface4); font-weight:600; }
    .md tr:nth-child(even) td { background:#fafbfc; }
    .md input[type="checkbox"] { margin-right:.4rem; accent-color:var(--accent); }
    .md hr { border:none; border-top:1px solid var(--border); margin:2rem 0; }
    .md img { max-width:100%; border-radius:var(--r2); display:block; margin:1.2rem 0; box-shadow:0 2px 12px rgba(0,0,0,.07); }
    .md a { color:var(--link); text-decoration:none; border-bottom:1px solid rgba(44,107,237,.25); }
    .md a:hover { color:var(--accent); border-bottom-color:var(--accent); }

    /* ───────── 欢迎页 ───────── */
    .welcome { padding:0 0 5rem; }

    /* 知识库封面区 */
    .welcome-hero {
      padding:3rem 2.5rem 2.5rem;
      border-bottom:1px solid var(--border);
      margin-bottom:1.8rem;
    }
    .welcome-hero h1 {
      font-size:1.9rem; font-weight:700; color:var(--text);
      margin-bottom:.55rem; letter-spacing:-.025em; line-height:1.25;
    }
    .welcome-hero p {
      color:var(--text2); font-size:.9rem; line-height:1.65;
      max-width:480px;
    }
    .hero-stats {
      display:flex; gap:1.5rem; margin-top:1.2rem;
    }
    .hero-stat {
      display:flex; flex-direction:column; gap:.1rem;
    }
    .hero-stat-num { font-size:1.4rem; font-weight:700; color:var(--accent); line-height:1; }
    .hero-stat-label { font-size:.72rem; color:var(--text3); }

    /* 卡片区 */
    .welcome-section {
      padding:0 2.5rem;
    }
    .welcome-section-title {
      font-size:.72rem; font-weight:600; letter-spacing:.06em;
      text-transform:uppercase; color:var(--text3);
      margin-bottom:.85rem;
    }
    .welcome-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
      gap:.6rem;
    }
    .wg-card {
      background:var(--surface4);
      border:1px solid var(--border);
      border-radius:var(--r2);
      padding:1rem 1.1rem .9rem;
      cursor:pointer;
      transition:box-shadow var(--t), border-color var(--t), background var(--t);
      position:relative; overflow:hidden;
    }
    .wg-card:hover {
      box-shadow:0 2px 12px rgba(0,0,0,.07);
      border-color:var(--border2);
      background:#fff;
    }
    .wg-card .wg-icon {
      font-size:1.4rem; flex-shrink:0;
      width:2.2rem; height:2.2rem;
      display:flex; align-items:center; justify-content:center;
      background:rgba(255,255,255,.9);
      border-radius:var(--r);
      border:1px solid var(--border);
    }
    .wg-card .wg-body { min-width:0; }
    .wg-card .wg-name { font-size:.86rem; font-weight:600; margin-bottom:.18rem; color:var(--text); }
    .wg-card .wg-count { font-size:.74rem; color:var(--text3); }
    .wg-card .wg-last {
      font-size:.71rem; color:var(--text3);
      margin-top:.28rem;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .wg-card .wg-last::before { content:'↳ '; }

    /* ───────── 状态 ───────── */
    .state-box {
      display:flex; flex-direction:column; align-items:center;
      padding:6rem 2rem; color:var(--text3); gap:1rem; text-align:center;
    }
    .spin {
      width:22px; height:22px;
      border:2px solid var(--border);
      border-top-color:var(--accent);
      border-radius:50%;
      animation:spin .75s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .state-box p { font-size:.85rem; }
    .err-icon { font-size:2.5rem; }

    /* ───────── 返回顶部 ───────── */
    #backTop {
      position:fixed; right:1.5rem; bottom:2rem; z-index:300;
      width:32px; height:32px; border-radius:50%;
      background:var(--accent); color:#fff; border:none;
      display:flex; align-items:center; justify-content:center;
      font-size:.85rem; cursor:pointer;
      opacity:0; pointer-events:none;
      transition:opacity .3s, transform .3s;
      box-shadow:0 2px 10px rgba(232,99,42,.25);
    }
    #backTop.show { opacity:1; pointer-events:all; }
    #backTop:hover { transform:translateY(-2px); }

    /* ───────── DARK ───────── */
    body.dark {
      --bg:#1a1b1e; --surface:#1a1b1e; --surface2:#1e1f22; --surface3:#1c1d20;
      --surface4:#24252a;
      --border:#2c2e35; --border2:#383b44;
      --text:#e8eaed; --text2:#9aa0ab; --text3:#4f5462;
      --accent-bg:rgba(232,99,42,.1); --accent-bg2:rgba(232,99,42,.06);

    /* 大屏：仅在 toc 可见时为内容区右移 */

    @media(max-width:1199px) {

<script>
  // ═══════════════════════════════════════
  //  配置
  // ═══════════════════════════════════════
  const DOCS_BASE = 'docs/';           // 静态文件基路径

  // 内嵌目录数据（file:// 直接打开时 fetch 无法使用，作为最终 fallback）
  // 新增分类/文章时，同步更新此处和 docs/_sidebar.json
  const FALLBACK_TREE = [
    { id:'ai-llm', name:'ai-llm', docs:[

    ]},

      { file:'exposure-triangle.md',        title:'📷 曝光三角' },
      { file:'composition.md',              title:'🎨 构图原则' },
      { file:'lightroom-editing.md',        title:'🎛️ Lightroom 后期调色' },
      { file:'post-processing-workflow.md', title:'🔧 后期实战工作流' },
      { file:'street-photography.md',       title:'🏙️ 街头摄影指南' },
    ]},
    { id:'diy', name:'diy', docs:[
      { file:'tools-guide.md',        title:'🌟 DIY 工具入门指南' },
      { file:'woodworking-basics.md', title:'🪵 木工基础' },
    ]},
  ];


  // 分类名映射：把英文文件夹名转为美观的中文展示名
  const CAT_ICONS = {
    'ai-llm':           '🤖',
    'ai-agent':         '🦾',
    'data-science':     '📊',
    frontend:           '🌐',
    'backend-eng':      '⚙️',
    guitar:             '🎸',
    photography:        '📸',
    diy:                '🛠',
    default:            '📁',
  };

  // 分类名映射：把英文文件夹名转为美观的中文展示名
  const CAT_LABELS = {
    'ai-llm':           '🤖 AI 与大模型',
    'ai-agent':         '🦾 AI Agent 开发',
    'data-science':     '📊 数据科学',
    frontend:           '🌐 前端开发',
    'backend-eng':      '⚙️ 后端 & 工程',
    guitar:             '🎸 吉他',
    photography:        '📸 摄影',
    diy:                '🛠 手工 & DIY',
  };
  function catLabel(id) {
    return CAT_LABELS[id.toLowerCase()] || CAT_ICONS[id.toLowerCase()] + ' ' + id;
  }
  function catIcon(id) {
    return CAT_ICONS[id.toLowerCase()] || CAT_ICONS.default;
  }

  // ═══════════════════════════════════════
  //  状态
  // ═══════════════════════════════════════
  let tree     = [];       // 目录树数据
  let curCat   = null;
  let curFile  = null;

  // ═══════════════════════════════════════
  //  主题
  // ═══════════════════════════════════════
  function toggleTheme() {
    const dark = !document.body.classList.contains('dark');
    localStorage.setItem('kb_theme', dark ? 'dark' : 'light');
    applyTheme(dark);
  }
  function applyTheme(dark) {
    document.body.classList.toggle('dark', dark);
    document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
  }
  applyTheme(localStorage.getItem('kb_theme') === 'dark');

  // ═══════════════════════════════════════
  //  移动端侧边栏
  // ═══════════════════════════════════════
  function toggleMobSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('mobOverlay').classList.toggle('show');
  }
  function closeMobSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('mobOverlay').classList.remove('show');
  }

  // ═══════════════════════════════════════
  //  加载目录树
  // ═══════════════════════════════════════
  const SESSION_KEY = 'kb_tree_cache';

  async function loadTree() {
    // ── 静态模式：直接读取 _sidebar.json，不依赖本地服务器 ──
    // 优先使用 sessionStorage 缓存快速渲染，避免白屏
    const cached = sessionStorage.getItem(SESSION_KEY);
    if (cached) {
      try {
        const parsed = JSON.parse(cached);
        tree = parsed.categories || [];
        renderTree();
      } catch { /* 缓存损坏则忽略 */ }
    }

    // 后台拉取最新 _sidebar.json
    try {
      const res = await fetch(DOCS_BASE + '_sidebar.json');
      if (!res.ok) throw new Error('sidebar not found');
      const data = await res.json();
      const newStr = JSON.stringify(data);
      if (newStr !== cached) {
        sessionStorage.setItem(SESSION_KEY, newStr);
        tree = data.categories || [];
        renderTree();
      }
    } catch {
      // 连 _sidebar.json 都读不到（file:// 协议限制），尝试内嵌数据
      if (!cached) {
        tree = FALLBACK_TREE;
        renderTree();
      }
    }
  }

  // ═══════════════════════════════════════
  //  渲染侧边栏目录树
  // ═══════════════════════════════════════
  function renderTree() {
    const sbTree = document.getElementById('sbTree');
    if (!tree.length) {
      sbTree.innerHTML = `<div class="sb-no-result" style="display:block;">暂无文章</div>`;
      return;
    }

    // 应用已保存的排序
    applySavedOrder();

    sbTree.innerHTML = tree.map(cat => `
      <div class="sb-cat" data-cat-id="${cat.id}" draggable="true">
        <div class="sb-cat-header" onclick="toggleCat(this)">
          <span class="drag-handle" title="拖拽排序">⠿</span>
          <span class="arrow">▶</span>
          <span class="cat-icon">${catIcon(cat.id)}</span>
          <span class="cat-name">${catLabel(cat.id)}</span>
        </div>
        <div class="sb-doc-list">
          ${cat.docs.map(doc => `
            <div class="sb-doc-item"
                 data-cat="${cat.id}"
                 data-file="${escHtml(doc.file)}"
                 data-title="${escHtml(doc.title)}"
                 draggable="true">
              <span class="drag-handle" title="拖拽排序">⠿</span>
              <span class="sb-doc-label" title="${escHtml(doc.title)}"
                    onclick="loadDoc('${cat.id}','${escJs(doc.file)}',this.closest('.sb-doc-item'))">${escHtml(doc.title)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('') + `<div class="sb-no-result" id="sbNoResult">没有匹配的文章</div>`;

    // 默认展开所有分类
    sbTree.querySelectorAll('.sb-cat-header').forEach(h => openCat(h));

    // 绑定拖拽逻辑
    bindDrag();
  }

  function toggleCat(header) {
    const list = header.nextElementSibling;
    const isOpen = list.classList.contains('open');
    if (isOpen) {
      list.classList.remove('open');
      header.classList.remove('open');
    } else {
      openCat(header);
    }
  }
  function openCat(header) {
    header.nextElementSibling.classList.add('open');
    header.classList.add('open');
  }

  // ═══════════════════════════════════════
  //  搜索过滤
  // ═══════════════════════════════════════
  function filterTree(q) {
    q = q.trim().toLowerCase();
    let any = false;
    document.querySelectorAll('.sb-cat').forEach(cat => {
      let catVisible = false;
      cat.querySelectorAll('.sb-doc-item').forEach(item => {
        const match = !q || item.dataset.title.toLowerCase().includes(q);
        item.classList.toggle('hidden', !match);
        if (match) catVisible = true;
      });
      cat.style.display = catVisible ? '' : 'none';
      if (catVisible) {
        any = true;
        // 搜索时自动展开
        if (q) openCat(cat.querySelector('.sb-cat-header'));
      }
    });
    const nr = document.getElementById('sbNoResult');
    if (nr) nr.style.display = any ? 'none' : 'block';
  }

  // ═══════════════════════════════════════
  //  加载并渲染文档
  // ═══════════════════════════════════════
  async function loadDoc(cat, file, itemEl) {
    // 高亮侧边栏
    document.querySelectorAll('.sb-doc-item').forEach(i => i.classList.remove('active'));
    if (itemEl) {
      itemEl.classList.add('active');
      // 确保父分类展开
      const list = itemEl.closest('.sb-doc-list');
      if (list && !list.classList.contains('open')) {
        openCat(list.previousElementSibling);
      }
    }

    curCat  = cat;
    curFile = file;
    localStorage.setItem('kb_last', JSON.stringify({ cat, file }));
    history.replaceState(null, null, `?cat=${encodeURIComponent(cat)}&doc=${encodeURIComponent(file)}`);

    const content = document.getElementById('docContent');
    content.innerHTML = '<div class="state-box"><div class="spin"></div><p>加载中…</p></div>';
    window.scrollTo(0, 0);
    closeMobSidebar();

    try {
      const url = `${DOCS_BASE}${cat}/${file}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const md = await res.text();
      renderDoc(md, cat, file);
    } catch (e) {
      content.innerHTML = `
        <div class="state-box">
          <span class="err-icon">😅</span>
          <p>文档加载失败：<code>${escHtml(cat)}/${escHtml(file)}</code></p>
          <p style="font-size:.78rem;color:var(--text3)">${e.message}</p>
          <p style="font-size:.78rem;margin-top:.5rem">提示：直接打开 HTML 文件时无法读取本地文档，<br>请运行 <strong>start.bat</strong> 启动本地服务后访问。</p>
        </div>`;
    }
  }

  function renderDoc(md, cat, file) {
    const charCount = md.replace(/\s+/g, '').length;
    const readMin   = Math.max(1, Math.ceil(charCount / 400));

    // 找分类显示名
    const catObj  = tree.find(c => c.id === cat);
    const catName = catObj ? catObj.name : cat;
    const docObj  = catObj?.docs.find(d => d.file === file);
    const docName = docObj?.title || file.replace(/\.md$/i, '');

    // 修改日期（来自 server 返回的 mtime）
    let mtimeStr = '';
    if (docObj?.mtime) {
      const d = new Date(docObj.mtime);
      mtimeStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // 更新顶部面包屑
    const navBC = document.getElementById('navBreadcrumb');
    if (navBC) {
      navBC.innerHTML = `
        <span class="nbc-item">知识库</span>
        <span class="nbc-sep">›</span>
        <span class="nbc-item">${catLabel(cat)}</span>
        <span class="nbc-sep">›</span>
        <span class="nbc-item current">${escHtml(docName)}</span>
      `;
    }

    // marked 库保护：若未加载则展示原始 markdown
    let htmlBody;
    if (typeof marked !== 'undefined') {
      try { htmlBody = marked.parse(md); }
      catch { htmlBody = `<pre style="white-space:pre-wrap">${escHtml(md)}</pre>`; }
    } else {
      htmlBody = `<pre style="white-space:pre-wrap">${escHtml(md)}</pre>
        <p style="color:var(--text3);font-size:.78rem;margin-top:1rem">⚠️ Markdown 渲染库未加载，显示原文</p>`;
    }

    document.getElementById('docContent').innerHTML = `
      <div class="breadcrumb">
        <span>知识库</span>
        <span class="bc-sep">›</span>
        <span class="bc-cat">${catLabel(cat)}</span>
        <span class="bc-sep">›</span>
        <span class="bc-doc">${escHtml(docName)}</span>
      </div>
      <div class="doc-meta">
        <span>📄 ${charCount} 字</span>
        <span>⏱ 约 ${readMin} 分钟</span>
        ${mtimeStr ? `<span>🕓 ${mtimeStr}</span>` : ''}
      </div>
      <div class="md">${htmlBody}</div>
    `;

    // 给代码块加语言标签（处理 marked 生成的 <pre><code class="language-xxx">）
    document.querySelectorAll('.md pre').forEach(pre => {
      const code = pre.querySelector('code');
      if (!code) return;
      const cls = code.className || '';
      const match = cls.match(/language-(\S+)/);
      if (match) {
        pre.setAttribute('data-lang', match[1]);
        pre.style.setProperty('--lang-label', `"${match[1]}"`);
        // 在 pre 顶部插入语言标签 div
        if (!pre.querySelector('.code-lang-tag')) {
          const tag = document.createElement('div');
          tag.className = 'code-lang-tag';
          tag.textContent = match[1];
          tag.style.cssText = 'padding:.22rem .8rem;background:rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.08);font-size:.7rem;color:rgba(255,255,255,.45);letter-spacing:.05em;font-weight:600;font-family:inherit;';
          pre.insertBefore(tag, pre.firstChild);
        }
      }
    });

    // 构建右侧大纲
    buildToc();
  }

  // ═══════════════════════════════════════
  //  欢迎页
  // ═══════════════════════════════════════
  // 各分类的彩色边条颜色
  const CAT_COLORS = {

    document.getElementById('docContent').querySelectorAll('.wg-card[data-welcome-cat]').forEach(el => {

  // ═══════════════════════════════════════
  //  文档内大纲（h2/h3，按层级展开）
  // ═══════════════════════════════════════
  function renderOutline(docItemEl) {
    // 清除所有旧大纲
    document.querySelectorAll('.sb-outline').forEach(o => o.remove());
    // 重置所有文章箭头状态
    document.querySelectorAll('.sb-doc-arrow').forEach(a => a.classList.remove('open'));

    const headings = document.querySelectorAll('.md h2, .md h3');
    if (!docItemEl) return;

    const arrow = docItemEl.querySelector('.sb-doc-arrow');

    if (!headings.length) {
      if (arrow) arrow.classList.remove('has-outline');
      return;
    }
    if (arrow) arrow.classList.add('has-outline');

    const outline = document.createElement('div');
    outline.className = 'sb-outline open'; // 默认展开大纲面板

    let currentH2El = null; // 当前 h2 行 DOM，用于关联 h3

    headings.forEach((h, idx) => {
      if (!h.id) h.id = 'heading-' + idx;
      const tag = h.tagName; // H2 or H3
      const text = h.textContent.replace(/^[\s•·▸▶⠿]+/, '').trim();

      if (tag === 'H2') {
        // ── h2 行，默认展开（open 状态）──
        const row = document.createElement('div');
        row.className = 'sb-outline-h2 open'; // 默认展开到 h2
        row.dataset.target = h.id;

        const arrowSpan = document.createElement('span');
        arrowSpan.className = 'h2-arrow';
        arrowSpan.textContent = '▶';

        const label = document.createElement('span');
        label.className = 'h2-label';
        label.textContent = text;
        label.title = text;

        row.appendChild(arrowSpan);
        row.appendChild(label);

        // 点 h2 行：跳转到该标题
        label.addEventListener('click', (e) => {
          e.stopPropagation();
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        // 点箭头：展开/折叠旗下 h3
        arrowSpan.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleH2Children(row, outline);
        });

        outline.appendChild(row);
        currentH2El = row;
      } else {
        // ── h3 行，默认折叠 ──
        const row = document.createElement('div');
        row.dataset.target = h.id;

        if (currentH2El) {
          // 有父 h2，默认隐藏（h2 虽 open，但 h3 默认不显示）
          row.className = 'sb-outline-h3';
          row.dataset.parent = currentH2El.dataset.target;
        } else {
          // 无父 h2，顶层展示
          row.className = 'sb-outline-h3 top-level';
        }
        row.textContent = text;
        row.title = text;

        row.addEventListener('click', (e) => {
          e.stopPropagation();
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        outline.appendChild(row);
      }
    });

    // 标记有 h3 子节点的 h2；没有的加 no-children
    outline.querySelectorAll('.sb-outline-h2').forEach(h2row => {
      const hasChild = outline.querySelector(`.sb-outline-h3[data-parent="${h2row.dataset.target}"]`);
      if (!hasChild) h2row.classList.add('no-children');
    });

    // 同步箭头状态：大纲面板默认展开，箭头也转到 open
    if (arrow) arrow.classList.add('open');

    docItemEl.after(outline);
    setupOutlineScroll(outline);
  }

  // 展开/折叠某个 h2 下的 h3 子项
  function toggleH2Children(h2row, outline) {
    if (h2row.classList.contains('no-children')) return;
    const isOpen = h2row.classList.contains('open');
    h2row.classList.toggle('open', !isOpen);
    const parentId = h2row.dataset.target;
    outline.querySelectorAll(`.sb-outline-h3[data-parent="${parentId}"]`).forEach(h3 => {
      h3.classList.toggle('visible', !isOpen);
    });
  }

  // 点击文章旁边的 ▶ 箭头：展开/折叠整个大纲面板
  function toggleOutline(arrowEl, e) {
    e.stopPropagation();
    if (!arrowEl.classList.contains('has-outline')) return;

    const docItem = arrowEl.closest('.sb-doc-item');
    const outline = docItem ? docItem.nextElementSibling : null;
    if (!outline || !outline.classList.contains('sb-outline')) return;

    const isOpen = outline.classList.contains('open');
    outline.classList.toggle('open', !isOpen);
    arrowEl.classList.toggle('open', !isOpen);
  }

  function setupOutlineScroll(outline) {
    if (!('IntersectionObserver' in window)) return;
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          // 兼容新类名 sb-outline-h2 / sb-outline-h3
          outline.querySelectorAll('[data-target]').forEach(item => {
            item.classList.toggle('active-heading', item.dataset.target === id);
          });
        }
      });
    }, { rootMargin: '-5% 0px -80% 0px', threshold: 0 });
    outline.querySelectorAll('[data-target]').forEach(item => {
      const el = document.getElementById(item.dataset.target);
      if (el) observer.observe(el);
    });
  }

  // ═══════════════════════════════════════
  //  拖拽排序
  // ═══════════════════════════════════════
  const ORDER_KEY = 'kb_order';
  // ═══════════════════════════════════════
  //  拖拽排序（容器级事件委托，修复上往下拖无效 bug）
  // ═══════════════════════════════════════
  let dragSrc  = null;
  let dragType = null; // 'cat' | 'doc'
  let _dragFromHandle = false; // 是否从 handle 发起

  function bindDrag() {
    const sbTree = document.getElementById('sbTree');

    // 记录是否从 drag-handle 按下
    sbTree.addEventListener('mousedown', e => {
      _dragFromHandle = !!e.target.closest('.drag-handle');
    });

    // ── dragstart：统一在容器上捕获 ──
    sbTree.addEventListener('dragstart', e => {
      if (!_dragFromHandle) {
        e.preventDefault();
        return;
      }
      const cat  = e.target.closest('.sb-cat');
      const item = e.target.closest('.sb-doc-item');
      if (item) {
        dragSrc  = item;
        dragType = 'doc';
        e.dataTransfer.effectAllowed = 'move';
        e.stopPropagation();
        setTimeout(() => item.style.opacity = '.4', 0);
      } else if (cat) {
        dragSrc  = cat;
        dragType = 'cat';
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => cat.style.opacity = '.4', 0);
      }
    }, true);

    // ── dragend：清理 ──
    sbTree.addEventListener('dragend', () => {
      if (dragSrc) dragSrc.style.opacity = '';
      sbTree.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
      sbTree.querySelectorAll('.drag-over-cat').forEach(el => el.classList.remove('drag-over-cat'));
      dragSrc  = null;
      dragType = null;
      _dragFromHandle = false;
    });

    // ── dragover：计算插入位置，显示占位线 ──
    sbTree.addEventListener('dragover', e => {
      if (!dragSrc) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      sbTree.querySelectorAll('.drag-placeholder').forEach(p => p.remove());

      if (dragType === 'cat') {
        const overCat = e.target.closest('.sb-cat');
        if (!overCat || overCat === dragSrc) return;
        const rect = overCat.getBoundingClientRect();
        const ph = document.createElement('div');
        ph.className = 'drag-placeholder';
        if (e.clientY < rect.top + rect.height / 2) overCat.before(ph);
        else overCat.after(ph);

      } else if (dragType === 'doc') {
        const overItem = e.target.closest('.sb-doc-item');
        if (!overItem || overItem === dragSrc) return;
        // 只允许同分类内
        if (overItem.closest('.sb-doc-list') !== dragSrc.closest('.sb-doc-list')) return;
        const rect = overItem.getBoundingClientRect();
        const ph = document.createElement('div');
        ph.className = 'drag-placeholder';
        if (e.clientY < rect.top + rect.height / 2) overItem.before(ph);
        else overItem.after(ph);
      }
    });

    // ── drop：执行移动 ──
    sbTree.addEventListener('drop', e => {
      if (!dragSrc) return;
      e.preventDefault();
      sbTree.querySelectorAll('.drag-placeholder').forEach(p => p.remove());

      if (dragType === 'cat') {
        const overCat = e.target.closest('.sb-cat');
        if (!overCat || overCat === dragSrc) return;
        const rect = overCat.getBoundingClientRect();
        if (e.clientY < rect.top + rect.height / 2) overCat.before(dragSrc);
        else overCat.after(dragSrc);
        saveCatOrder();

      } else if (dragType === 'doc') {
        const overItem = e.target.closest('.sb-doc-item');
        if (!overItem || overItem === dragSrc) return;
        const list = dragSrc.closest('.sb-doc-list');
        if (overItem.closest('.sb-doc-list') !== list) return;
        const rect = overItem.getBoundingClientRect();
        if (e.clientY < rect.top + rect.height / 2) overItem.before(dragSrc);
        else overItem.after(dragSrc);
        saveDocOrder(list);
      }
    });
  }

  // 保存分类顺序到 localStorage
  function saveCatOrder() {
    const sbTree = document.getElementById('sbTree');
    const catOrder = [...sbTree.querySelectorAll('.sb-cat')].map(c => c.dataset.catId);
    const saved = getSavedOrder();
    saved.catOrder = catOrder;
    localStorage.setItem(ORDER_KEY, JSON.stringify(saved));
    // 同步 tree 数组顺序
    tree.sort((a, b) => {
      const ai = catOrder.indexOf(a.id), bi = catOrder.indexOf(b.id);
      return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    });
  }

  // 保存某分类内文章顺序
  function saveDocOrder(list) {
    const catId = list.closest('.sb-cat').dataset.catId;
    const docOrder = [...list.querySelectorAll('.sb-doc-item')].map(d => d.dataset.file);
    const saved = getSavedOrder();
    if (!saved.docOrders) saved.docOrders = {};
    saved.docOrders[catId] = docOrder;
    localStorage.setItem(ORDER_KEY, JSON.stringify(saved));
    // 同步 tree 数组顺序
    const catObj = tree.find(c => c.id === catId);
    if (catObj) {
      catObj.docs.sort((a, b) => {
        const ai = docOrder.indexOf(a.file), bi = docOrder.indexOf(b.file);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });
    }
  }

  function getSavedOrder() {
    try { return JSON.parse(localStorage.getItem(ORDER_KEY)) || {}; } catch { return {}; }
  }

  // 在渲染前，把 tree 数组按已保存顺序重新排列
  function applySavedOrder() {
    const saved = getSavedOrder();
    if (saved.catOrder && saved.catOrder.length) {
      tree.sort((a, b) => {
        const ai = saved.catOrder.indexOf(a.id), bi = saved.catOrder.indexOf(b.id);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });
    }
    if (saved.docOrders) {
      tree.forEach(cat => {
        const order = saved.docOrders[cat.id];
        if (order && order.length) {
          cat.docs.sort((a, b) => {
            const ai = order.indexOf(a.file), bi = order.indexOf(b.file);
            return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
          });
        }
      });
    }
  }

  // ═══════════════════════════════════════
  //  工具函数
  // ═══════════════════════════════════════
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escJs(s) {
    return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  }

  // 返回顶部
  window.addEventListener('scroll', () => {
    document.getElementById('backTop').classList.toggle('show', window.scrollY > 400);
  });

  // ═══════════════════════════════════════
  //  初始化
  // ═══════════════════════════════════════
  async function init() {
    await loadTree();

    const params = new URLSearchParams(location.search);
    const cat  = params.get('cat');
    const doc  = params.get('doc');
    const saved = (() => { try { return JSON.parse(localStorage.getItem('kb_last')); } catch { return null; } })();

    let target = null;
    if (cat && doc) target = { cat, file: doc };
    else if (saved) target = saved;

    if (target && tree.find(c => c.id === target.cat)) {
      const item = document.querySelector(`[data-cat="${target.cat}"][data-file="${CSS.escape(target.file)}"]`);
      loadDoc(target.cat, target.file, item);
    } else if (tree.length > 0) {
      showWelcome();
    } else {
      document.getElementById('docContent').innerHTML = `
        <div class="state-box">
          <span class="err-icon">📂</span>
          <p>docs/ 目录下还没有文章</p>
          <p style="font-size:.78rem">在 docs/ 子文件夹中放入 .md 文件，刷新即可显示</p>
        </div>`;
    }
  }

  // ═══════════════════════════════════════
  //  右侧大纲栏 (TOC)
  // ═══════════════════════════════════════
  let _tocObserver = null;

  function buildToc() {
    const tocAside  = document.getElementById('tocAside');
    const tocList   = document.getElementById('tocList');
    if (!tocAside || !tocList) return;

    const headings = [...document.querySelectorAll('.md h2, .md h3')];
    if (!headings.length || window.innerWidth < 1200) {
      hideToc();
      return;
    }

    tocList.innerHTML = headings.map((h, i) => {
      if (!h.id) h.id = 'heading-' + i;
      const text = h.textContent.replace(/^[\s•·▸▶⠿]+/, '').trim();
      const cls  = h.tagName === 'H2' ? 'toc-item toc-h2' : 'toc-item toc-h3';
      return `<div class="${cls}" data-toc="${h.id}" title="${escHtml(text)}">${escHtml(text)}</div>`;
    }).join('');

    // 点击跳转
    tocList.querySelectorAll('.toc-item').forEach(item => {
      item.addEventListener('click', () => {
        const el = document.getElementById(item.dataset.toc);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    tocAside.classList.add('visible');
    document.body.classList.add('toc-open');

    // 滚动高亮
    if (_tocObserver) _tocObserver.disconnect();
    _tocObserver = new IntersectionObserver(entries => {
      entries.forEach(entry => {

        if (entry.isIntersecting) {
          const id = entry.target.id;
          tocList.querySelectorAll('.toc-item').forEach(item => {
            item.classList.toggle('toc-active', item.dataset.toc === id);
          });
        }
      });
    }, { rootMargin: '-8% 0px -80% 0px', threshold: 0 });

    headings.forEach(h => _tocObserver.observe(h));
  }

  function hideToc() {
    const tocAside = document.getElementById('tocAside');
    if (tocAside) tocAside.classList.remove('visible');
    document.body.classList.remove('toc-open');
    if (_tocObserver) { _tocObserver.disconnect(); _tocObserver = null; }
  }

  // 窗口 resize 时处理大纲栏显示/隐藏
  window.addEventListener('resize', () => {
    const hasMd = !!document.querySelector('.md');
    if (hasMd) {
      if (window.innerWidth >= 1200) buildToc();
      else hideToc();
    }
  });

  init();

</script>
